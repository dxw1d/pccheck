<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCCheck</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --border-light: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #666;
    --text-dim: #444;
    --red: #ff3b3b;
    --yellow: #f5c518;
    --green: #2ecc71;
    --accent: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LANDING */
  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
    text-align: center;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .logo span { color: var(--text-muted); }

  .tagline {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .drop-zone {
    width: 100%;
    max-width: 480px;
    border: 1px solid var(--border-light);
    padding: 48px 32px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #fff;
    background: #161616;
  }

  .drop-zone-icon {
    font-size: 32px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .drop-zone p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 2;
  }

  .drop-zone p strong { color: var(--text); font-weight: 700; }

  #fileInput { display: none; }

  .paste-area {
    width: 100%;
    max-width: 480px;
    margin-top: 16px;
    position: relative;
  }

  .paste-area textarea {
    width: 100%;
    height: 80px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }

  .paste-area textarea:focus { border-color: var(--border-light); }
  .paste-area textarea::placeholder { color: var(--text-dim); }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 32px;
    border: 1px solid #fff;
    background: transparent;
    color: #fff;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.15s, color 0.15s;
    width: 100%;
    max-width: 480px;
  }

  .btn:hover { background: #fff; color: #000; }

  /* REPORT */
  #report { display: none; }

  .report-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .report-logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .report-logo span { color: var(--text-muted); }

  .report-meta {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.8;
    text-align: right;
  }

  .verdict-bar {
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .verdict-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 20px;
    border: 1px solid;
  }

  .verdict-badge.clean { border-color: var(--green); color: var(--green); }
  .verdict-badge.suspicious { border-color: var(--yellow); color: var(--yellow); }
  .verdict-badge.flagged { border-color: var(--red); color: var(--red); }

  .verdict-text {
    font-size: 13px;
    color: var(--text-muted);
  }

  .flag-count {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .report-body {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  @media (max-width: 768px) {
    .report-body { grid-template-columns: 1fr; padding: 20px; }
    .report-header { padding: 16px 20px; }
    .verdict-bar { padding: 16px 20px; }
  }

  .section {
    background: var(--bg);
    padding: 28px;
  }

  .section.wide { grid-column: 1 / -1; }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .flag-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .flag-dot.red { background: var(--red); }
  .flag-dot.yellow { background: var(--yellow); }
  .flag-dot.green { background: var(--green); }

  .item {
    padding: 10px 14px;
    border-left: 2px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
    line-height: 1.6;
    transition: border-color 0.15s;
    position: relative;
  }

  .item:hover { border-left-color: var(--border-light); }
  .item.flag-red { border-left-color: var(--red); background: rgba(255,59,59,0.04); }
  .item.flag-yellow { border-left-color: var(--yellow); background: rgba(245,197,24,0.04); }
  .item.flag-green { border-left-color: var(--green); background: rgba(46,204,113,0.04); }

  .item-name {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    word-break: break-all;
  }

  .item-detail {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .item-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    margin-top: 6px;
    border: 1px solid;
  }

  .item-tag.unsigned { border-color: var(--red); color: var(--red); }
  .item-tag.suspicious { border-color: var(--yellow); color: var(--yellow); }
  .item-tag.signed { border-color: var(--border-light); color: var(--text-dim); }
  .item-tag.removed { border-color: var(--red); color: var(--red); }
  .item-tag.usb { border-color: #888; color: #888; }

  .empty-state {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 16px 0;
    text-align: center;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 28px;
  }

  .stat {
    background: var(--bg);
    padding: 20px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .sysinfo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .sysinfo-item {
    padding: 12px;
    background: var(--surface);
  }

  .sysinfo-key {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .sysinfo-val {
    font-size: 12px;
    color: var(--text);
    word-break: break-word;
  }

  .scroll-list {
    max-height: 300px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }

  .back-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-transform: uppercase;
  }

  .back-btn:hover { color: var(--text); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    flex-direction: column;
    gap: 20px;
  }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--text-muted);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  .ps-block {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
  }

  .timeline-item {
    display: flex;
    gap: 16px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .timeline-time {
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    flex-shrink: 0;
    width: 140px;
    font-size: 10px;
  }

  .timeline-event { color: var(--text); }
  .timeline-event.red { color: var(--red); }
  .timeline-event.yellow { color: var(--yellow); }
</style>
</head>
<body>

<div id="landing">
  <div class="logo">PC<span>/</span>CHECK</div>
  <div class="tagline">CandyRP · Anti-Cheat Verification</div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-zone-icon">⬆</div>
    <p><strong>Upuść plik JSON</strong> lub kliknij aby wybrać</p>
    <p>Plik wygenerowany przez pcheck.ps1</p>
    <input type="file" id="fileInput" accept=".json,.txt">
  </div>

  <div class="paste-area">
    <textarea id="pasteArea" placeholder="...lub wklej tutaj base64 z terminala"></textarea>
  </div>

  <button class="btn" id="loadBtn">ZAŁADUJ RAPORT →</button>
</div>

<div id="loadingScreen" class="loading" style="display:none">
  <div class="loading-text">ANALIZOWANIE DANYCH...</div>
</div>

<div id="report"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const pasteArea = document.getElementById('pasteArea');
const loadBtn = document.getElementById('loadBtn');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
loadBtn.addEventListener('click', () => {
  const text = pasteArea.value.trim();
  if (text) processRaw(text);
});

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => processRaw(e.target.result);
  reader.readAsText(file);
}

function processRaw(raw) {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('loadingScreen').style.display = 'flex';
  setTimeout(() => {
    try {
      let data;
      const trimmed = raw.trim();
      if (trimmed.startsWith('{')) {
        data = JSON.parse(trimmed);
      } else {
        const decoded = atob(trimmed);
        data = JSON.parse(decoded);
      }
      renderReport(data);
    } catch(e) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('landing').style.display = 'flex';
      alert('Błąd parsowania danych. Sprawdź czy plik jest poprawny.\n' + e.message);
    }
  }, 800);
}

// check URL hash on load
window.addEventListener('load', () => {
  const hash = window.location.hash.slice(1);
  if (!hash) return;

  // Format: id:JSONBIN_ID
  if (hash.startsWith('id:')) {
    const binId = hash.slice(3);
    document.getElementById('landing').style.display = 'none';
    document.getElementById('loadingScreen').style.display = 'flex';
    fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Access-Key': '' } // publiczny bin nie wymaga klucza
    })
    .then(r => r.json())
    .then(data => {
      if (data && data.record) {
        renderReport(data.record);
      } else {
        throw new Error('Brak danych w odpowiedzi');
      }
    })
    .catch(e => {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('landing').style.display = 'flex';
      alert('Blad pobierania raportu z serwera: ' + e.message);
    });
  } else {
    // base64 fallback
    try { processRaw(hash); } catch(e) {}
  }
});

function isSuspiciousPath(path) {
  if (!path) return false;
  const p = path.toLowerCase();
  const bad = ['\\temp\\', '\\tmp\\', '%temp%', 'appdata\\local\\temp', 'appdata\\roaming\\temp',
    '\\downloads\\', 'c:\\users\\public\\', 'c:\\programdata\\', '\\recycle', 'desktop\\'];
  return bad.some(b => p.includes(b));
}

function isKnownCheat(name) {
  if (!name) return false;
  const n = name.toLowerCase();
  const cheats = ['eulen', 'keyser', 'redengine', 'hammafia', 'lynx', 'rpe', 'scripthook',
    'trainer', 'inject', 'cheat', 'hack', 'bypass', 'spoofer', 'loader', 'dumper'];
  return cheats.some(c => n.includes(c));
}

function formatDate(dateStr) {
  if (!dateStr) return 'N/A';
  try {
    return new Date(dateStr).toLocaleString('pl-PL');
  } catch(e) { return dateStr; }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderReport(data) {
  document.getElementById('loadingScreen').style.display = 'none';

  let flags = [];
  let warnings = [];

  // Count flags
  const processes = data.Processes || [];
  const drivers = data.Drivers || [];
  const prefetch = data.Prefetch || [];
  const usb = data.USB || [];
  const defenderEvents = data.DefenderEvents || [];
  const serviceEvents = data.ServiceEvents || [];
  const psHistory = data.PSHistory || {};
  const sysInfo = data.SystemInfo || {};
  const execPrograms = data.ExecutedPrograms || [];
  const userAssist = data.UserAssist || [];
  const recentFiles = data.RecentFiles || [];

  // Flag logic
  processes.filter(p => !p.Signed && p.Path).forEach(p => {
    if (isSuspiciousPath(p.Path)) flags.push(`Niepodpisany proces z podejrzanej lokalizacji: ${p.Name}`);
    else if (isKnownCheat(p.Name)) flags.push(`Znany cheat w procesach: ${p.Name}`);
    else warnings.push(`Niepodpisany proces: ${p.Name}`);
  });

  drivers.filter(d => !d.Signed).forEach(d => {
    flags.push(`Sterownik bez podpisu: ${d.Name}`);
  });

  execPrograms.filter(e => isKnownCheat(e.Name || '')).forEach(e => {
    flags.push(`Znany cheat w historii uruchomień: ${e.Name}`);
  });

  execPrograms.filter(e => isSuspiciousPath(e.Path || '')).forEach(e => {
    warnings.push(`Program z podejrzanej ścieżki: ${e.Name}`);
  });

  if (psHistory.Cleared) flags.push('Historia PowerShell była czyszczona');

  defenderEvents.filter(e => e.Type === 'Disable').forEach(e => {
    flags.push(`Defender był wyłączany: ${formatDate(e.Time)}`);
  });

  defenderEvents.filter(e => e.Type === 'Exclusion').forEach(e => {
    warnings.push(`Dodano wykluczenie Defender: ${e.Detail}`);
  });

  const stoppedServices = serviceEvents.filter(e => e.State === 'Stopped');
  stoppedServices.forEach(e => {
    if (['windefend','sense','mssecflt','wdnisdrv'].includes((e.Service||'').toLowerCase())) {
      flags.push(`Usługa ochronna zatrzymana: ${e.Service} o ${formatDate(e.Time)}`);
    }
  });

  const verdictClass = flags.length > 0 ? 'flagged' : warnings.length > 0 ? 'suspicious' : 'clean';
  const verdictText = flags.length > 0 ? 'PODEJRZANY' : warnings.length > 0 ? 'DO WERYFIKACJI' : 'CZYSTY';
  const verdictDesc = flags.length > 0
    ? `Znaleziono ${flags.length} krytycznych flag`
    : warnings.length > 0
    ? `Znaleziono ${warnings.length} ostrzeżeń wymagających weryfikacji`
    : 'Brak podejrzanych artefaktów';

  // Render
  const reportEl = document.getElementById('report');
  reportEl.style.display = 'block';

  reportEl.innerHTML = `
    <div class="report-header">
      <div>
        <div class="report-logo">PC<span>/</span>CHECK</div>
      </div>
      <div class="report-meta">
        ${escHtml(sysInfo.ComputerName || 'UNKNOWN')}<br>
        ${escHtml(sysInfo.Username || '')}<br>
        ${formatDate(sysInfo.ScanTime)}<br>
        <button class="back-btn" onclick="location.reload()">← NOWY RAPORT</button>
      </div>
    </div>

    <div class="verdict-bar">
      <div class="verdict-badge ${verdictClass}">${verdictText}</div>
      <div class="verdict-text">${verdictDesc}</div>
      <div class="flag-count">${flags.length} FLAG / ${warnings.length} WARN</div>
    </div>

    <div class="report-body">

      <!-- STAT OVERVIEW -->
      <div class="section wide">
        <div class="stat-grid">
          <div class="stat">
            <div class="stat-value ${flags.length > 0 ? 'red' : ''}">${flags.length}</div>
            <div class="stat-label">Krytyczne flagi</div>
          </div>
          <div class="stat">
            <div class="stat-value ${warnings.length > 0 ? 'yellow' : ''}">${warnings.length}</div>
            <div class="stat-label">Ostrzeżenia</div>
          </div>
          <div class="stat">
            <div class="stat-value">${processes.length}</div>
            <div class="stat-label">Aktywne procesy</div>
          </div>
        </div>
        ${flags.length > 0 || warnings.length > 0 ? `
        <div class="scroll-list">
          ${flags.map(f => `<div class="item flag-red"><div class="item-name">⚠ ${escHtml(f)}</div></div>`).join('')}
          ${warnings.map(w => `<div class="item flag-yellow"><div class="item-name">△ ${escHtml(w)}</div></div>`).join('')}
        </div>` : '<div class="empty-state">BRAK WYKRYTYCH ANOMALII</div>'}
      </div>

      <!-- SYSTEM INFO -->
      <div class="section">
        <div class="section-title">System</div>
        <div class="sysinfo-grid">
          ${Object.entries(sysInfo).map(([k,v]) => `
            <div class="sysinfo-item">
              <div class="sysinfo-key">${escHtml(k)}</div>
              <div class="sysinfo-val">${escHtml(String(v))}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- USB -->
      <div class="section">
        <div class="section-title">USB Historia</div>
        <div class="scroll-list">
          ${usb.length === 0 ? '<div class="empty-state">BRAK</div>' : usb.map(u => `
            <div class="item">
              <div class="item-name">${escHtml(u.Name || u.DeviceID || 'Unknown')}</div>
              <div class="item-detail">${escHtml(u.SerialNumber || '')} · ${formatDate(u.LastConnected)}</div>
              <span class="item-tag usb">USB</span>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- DLL SCAN -->
      <div class="section wide">
        <div class="section-title">DLL Scan — Podejrzane Lokalizacje</div>
        <div class="scroll-list">
          ${(data.DLLScan||[]).length===0
            ? '<div class="empty-state">BRAK PODEJRZANYCH PLIKÓW</div>'
            : (data.DLLScan||[]).map(d=>`
            <div class="item ${d.Suspicious?'flag-red':'flag-yellow'}">
              <div class="item-name">${escHtml(d.Name)}</div>
              <div class="item-detail">${escHtml(d.Path)} · ${formatDate(d.Modified)}</div>
              ${d.Suspicious?'<span class="item-tag unsigned">CHEAT?</span>':''}
              ${!d.Signed?'<span class="item-tag unsigned">NIEPODPISANY</span>':''}
            </div>`).join('')}
        </div>
      </div>

      <!-- PROCESSES -->
      <div class="section wide">
        <div class="section-title">Aktywne Procesy</div>
        <div class="scroll-list">
          ${processes.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : processes.map(p => {
            const suspicious = isSuspiciousPath(p.Path) || isKnownCheat(p.Name);
            const cls = suspicious ? 'flag-red' : !p.Signed ? 'flag-yellow' : '';
            return `<div class="item ${cls}">
              <div class="item-name">${escHtml(p.Name)}</div>
              <div class="item-detail">${escHtml(p.Path || 'N/A')} · PID: ${p.PID || 'N/A'}</div>
              ${!p.Signed ? '<span class="item-tag unsigned">NIEPODPISANY</span>' : '<span class="item-tag signed">PODPISANY</span>'}
              ${isKnownCheat(p.Name) ? '<span class="item-tag suspicious">CHEAT?</span>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- DRIVERS -->
      <div class="section wide">
        <div class="section-title">Sterowniki Kernelowe</div>
        <div class="scroll-list">
          ${drivers.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : drivers.map(d => `
            <div class="item ${!d.Signed ? 'flag-red' : ''}">
              <div class="item-name">${escHtml(d.Name)}</div>
              <div class="item-detail">${escHtml(d.Path || 'N/A')}</div>
              ${!d.Signed ? '<span class="item-tag unsigned">BEZ PODPISU</span>' : '<span class="item-tag signed">PODPISANY</span>'}
            </div>
          `).join('')}
        </div>
      </div>

      <!-- PREFETCH -->
      <div class="section">
        <div class="section-title">Prefetch</div>
        <div class="scroll-list">
          ${prefetch.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : prefetch.map(p => {
            const sus = isKnownCheat(p.Name);
            return `<div class="item ${sus ? 'flag-red' : ''}">
              <div class="item-name">${escHtml(p.Name)}</div>
              <div class="item-detail">Ostatnie: ${formatDate(p.LastRun)} · ${p.RunCount || '?'}x</div>
              ${sus ? '<span class="item-tag suspicious">CHEAT?</span>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- EXECUTED PROGRAMS -->
      <div class="section">
        <div class="section-title">Historia Uruchomień</div>
        <div class="scroll-list">
          ${execPrograms.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : execPrograms.map(e => {
            const sus = isKnownCheat(e.Name || '') || isSuspiciousPath(e.Path || '');
            return `<div class="item ${sus ? 'flag-yellow' : ''}">
              <div class="item-name">${escHtml(e.Name || 'Unknown')}</div>
              <div class="item-detail">${escHtml(e.Path || '')} · ${formatDate(e.LastRun)}</div>
              ${sus ? '<span class="item-tag suspicious">PODEJRZANY</span>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- DEFENDER -->
      <div class="section">
        <div class="section-title">Windows Defender</div>
        <div class="scroll-list">
          ${defenderEvents.length === 0 ? '<div class="empty-state">BRAK EVENTÓW</div>' : defenderEvents.map(e => `
            <div class="item ${e.Type === 'Disable' ? 'flag-red' : e.Type === 'Exclusion' ? 'flag-yellow' : ''}">
              <div class="item-name">${escHtml(e.Type || 'Event')}</div>
              <div class="item-detail">${formatDate(e.Time)} · ${escHtml(e.Detail || '')}</div>
              ${e.Type === 'Disable' ? '<span class="item-tag unsigned">WYŁĄCZONY</span>' : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <!-- SERVICE EVENTS -->
      <div class="section">
        <div class="section-title">Zdarzenia Usług</div>
        <div class="scroll-list">
          ${serviceEvents.length === 0 ? '<div class="empty-state">BRAK EVENTÓW</div>' : serviceEvents.map(e => `
            <div class="item ${e.State === 'Stopped' ? 'flag-yellow' : ''}">
              <div class="item-name">${escHtml(e.Service || 'Unknown')}</div>
              <div class="item-detail">${escHtml(e.State)} · ${formatDate(e.Time)}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- POWERSHELL HISTORY -->
      <div class="section wide">
        <div class="section-title">Historia PowerShell ${psHistory.Cleared ? '<span style="color:var(--red);margin-left:8px">CZYSZCZONA</span>' : ''}</div>
        ${psHistory.Cleared ? '<div class="item flag-red"><div class="item-name">Historia PowerShell była czyszczona lub plik jest podejrzanie świeży</div></div>' : ''}
        ${psHistory.Content ? `<div class="ps-block">${escHtml(psHistory.Content)}</div>` : '<div class="empty-state">BRAK HISTORII</div>'}
      </div>

      <!-- USER ASSIST -->
      <div class="section">
        <div class="section-title">UserAssist</div>
        <div class="scroll-list">
          ${userAssist.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : userAssist.map(u => {
            const sus = isKnownCheat(u.Name || '');
            return `<div class="item ${sus ? 'flag-red' : ''}">
              <div class="item-name">${escHtml(u.Name || 'Unknown')}</div>
              <div class="item-detail">Uruchomień: ${u.Count || '?'} · Ostatnio: ${formatDate(u.LastRun)}</div>
              ${sus ? '<span class="item-tag suspicious">CHEAT?</span>' : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- RECENT FILES -->
      <div class="section">
        <div class="section-title">Ostatnie Pliki</div>
        <div class="scroll-list">
          ${recentFiles.length === 0 ? '<div class="empty-state">BRAK DANYCH</div>' : recentFiles.slice(0, 50).map(f => {
            const sus = isKnownCheat(f.Name || '') || isSuspiciousPath(f.Path || '');
            return `<div class="item ${sus ? 'flag-yellow' : ''}">
              <div class="item-name">${escHtml(f.Name || f.Path || 'Unknown')}</div>
              <div class="item-detail">${formatDate(f.Modified)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

    </div>
  `;
}
</script>
</body>
</html>
